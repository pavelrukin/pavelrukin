<svg width="45" height="60" viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3ddc84;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes bounce {
        0%, 100% { transform: translateY(0) scaleY(1); }
        50% { transform: translateY(-12px) scaleY(1.05); }
      }
      @keyframes pulse-glow {
        0%, 100% { filter: drop-shadow(0 4px 8px rgba(61, 220, 132, 0.25)); }
        50% { filter: drop-shadow(0 6px 12px rgba(61, 220, 132, 0.45)); }
      }
      @keyframes wave {
        0%, 100% { transform: rotate(0deg); transform-origin: 50% 15%; }
        25% { transform: rotate(-20deg); transform-origin: 50% 15%; }
        75% { transform: rotate(20deg); transform-origin: 50% 15%; }
      }
      @keyframes blink {
        0%, 90%, 100% { opacity: 1; }
        95% { opacity: 0; }
      }
      @keyframes walk {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(2px); }
      }
      .robot { animation: bounce 2s ease-in-out infinite, walk 1.5s ease-in-out infinite; }
      .robot-glow { animation: pulse-glow 2.5s ease-in-out infinite; }
      .antenna { animation: wave 1.8s ease-in-out infinite; }
      .eye { animation: blink 4s ease-in-out infinite; }
      .body { animation: bounce 2s ease-in-out infinite; }
    </style>
  </defs>

  <g class="robot-glow">
    <g class="robot">
      <!-- Head -->
      <g class="head">
        <rect x="28" y="18" width="44" height="38" rx="5" fill="url(#robotGradient)" stroke="#00d4aa" stroke-width="1.5"/>
        
        <!-- Eyes -->
        <circle cx="38" cy="32" r="4" class="eye" fill="#000"/>
        <circle cx="62" cy="32" r="4" class="eye" fill="#000"/>
        
        <!-- Antenna -->
        <line x1="50" y1="18" x2="50" y2="4" stroke="#3ddc84" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="50" cy="2" r="2.5" fill="#3ddc84" class="antenna"/>
      </g>

      <!-- Body -->
      <g class="body">
        <rect x="26" y="58" width="48" height="50" rx="4" fill="url(#robotGradient)" stroke="#00d4aa" stroke-width="1.5"/>
        
        <!-- Chest detail -->
        <rect x="35" y="68" width="30" height="28" rx="2" fill="rgba(255,255,255,0.15)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
      </g>

      <!-- Left arm -->
      <rect x="16" y="70" width="10" height="32" rx="5" fill="url(#robotGradient)" stroke="#00d4aa" stroke-width="1.5"/>
      
      <!-- Right arm -->
      <rect x="74" y="70" width="10" height="32" rx="5" fill="url(#robotGradient)" stroke="#00d4aa" stroke-width="1.5"/>

      <!-- Left leg -->
      <rect x="32" y="108" width="10" height="28" rx="5" fill="#3ddc84" stroke="#00d4aa" stroke-width="1.5"/>
      
      <!-- Right leg -->
      <rect x="58" y="108" width="10" height="28" rx="5" fill="#3ddc84" stroke="#00d4aa" stroke-width="1.5"/>

      <!-- Feet -->
      <circle cx="37" cy="140" r="5" fill="#00d4aa"/>
      <circle cx="63" cy="140" r="5" fill="#00d4aa"/>
    </g>
  </g>
</svg>
